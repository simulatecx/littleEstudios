# SimulateCX — Firebase Hosting Production Deployer
#
# Triggers automatically when a PR merges to the default branch.
# Only changed files are uploaded — Firebase CLI diffs against the live channel.
#
# No setup needed beyond what's already in place for preview-deploy.yml —
# same WIF_PROVIDER, WIF_SA, and FIREBASE_PROJECT variables are reused.

name: Deploy to Production

on:
  push:
    branches:
      - master
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SA }}

      # ── Static HTML sites (no build step) ────────────────────────────────
      - name: Deploy to Firebase Hosting (live channel)
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --project "$FIREBASE_PROJECT"
        env:
          FIREBASE_PROJECT: ${{ vars.FIREBASE_PROJECT }}

      # ── Next.js / React sites (uncomment, replace static deploy above) ───
