  # SimulateCX — Firebase Hosting Preview Channel Deployer
  #
  # Copy to .github/workflows/preview-deploy.yml in the CLIENT's repo.
  # Triggered manually by the SimulateCX Cloud Function when the editor
  # clicks "Send to UAT" — NOT on every push. Previews last 7 days.
  #
  # SETUP (one-time per client repo):
  #   1. Run: firebase login:ci  (copy the token)
  #   2. GitHub repo → Settings → Secrets → Actions → New secret
  #      Name: FIREBASE_TOKEN   Value: (the token)
  #   3. Commit this file to .github/workflows/preview-deploy.yml on main
  #   4. Update your SimulateCX GitHub PAT to include Actions: read & write

  name: Deploy Preview Channel (on-demand)

  on:
    workflow_dispatch:
      inputs:
        channel_id:
          description: 'Firebase preview channel ID (max 28 chars, lowercase, hyphens)'
          required: true
        ref:
          description: 'Branch to deploy'
          required: true

  jobs:
    preview:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
          with:
            ref: ${{ github.event.inputs.ref }}

        - name: Deploy to Firebase preview channel
          run: |
            npm install -g firebase-tools
            firebase hosting:channel:deploy "$CHANNEL_ID" \
              --project "${{ vars.FIREBASE_PROJECT_ID || 'rach-littleestudios' }}" \
              --expires 7d
          env:
            FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
            CHANNEL_ID: ${{ github.event.inputs.channel_id }}

        - name: Echo preview URL
          run: |
            PROJECT="${{ vars.FIREBASE_PROJECT_ID || 'rach-littleestudios' }}"
            echo "Preview URL: https://${PROJECT}--${{ github.event.inputs.channel_id }}.web.app"
